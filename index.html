<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的公众号文章</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 30px;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        .article-list {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .article-item {
            padding: 25px 30px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        
        .article-item:last-child {
            border-bottom: none;
        }
        
        .article-item:hover {
            background: #f8f9ff;
            padding-left: 40px;
        }
        
        .article-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .article-item:hover .article-title {
            color: #667eea;
        }
        
        .article-meta {
            display: flex;
            gap: 20px;
            color: #999;
            font-size: 14px;
        }
        
        .article-tag {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .category-nav {
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .category-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .category-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .category-btn.active {
            background: #667eea;
            color: white;
        }
        
        .add-hint {
            padding: 40px 30px;
            text-align: center;
            background: #f8f9ff;
            border-radius: 10px;
            margin: 10px;
        }
        
        .hint-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .hint-text {
            font-size: 18px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .hint-sub {
            font-size: 14px;
            color: #999;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .header {
                padding: 30px 20px;
            }
            
            .article-item {
                padding: 20px;
            }
            
            .article-item:hover {
                padding-left: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🏮</div>
            <h1>州官点灯学习</h1>
            <p>分享实用工具和学习方法</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">1</div>
                    <div class="stat-label">篇文章</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">+</div>
                    <div class="stat-label">持续更新</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">💡</div>
                    <div class="stat-label">实用干货</div>
                </div>
            </div>
        </div>
        
        <div class="category-nav">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="tool">🔧 实用工具</button>
            <button class="category-btn" data-category="study">📚 学习方法</button>
            <button class="category-btn" data-category="efficiency">⚡ 效率提升</button>
            <button class="category-btn" data-category="resource">🎁 资源分享</button>
        </div>
        
        <div class="article-list">
            <a href="https://mp.weixin.qq.com/s/ORych-k7l_kby2WxTsSrMQ" target="_blank" class="article-item" data-category="tool">
                <div class="article-title">📄 免费caj转pdf方法！</div>
                <div class="article-meta">
                    <span>2024-03-10</span>
                    <span class="article-tag">实用工具</span>
                    <span>州官点灯学习</span>
                </div>
            </a>
            
            <a href="#" class="article-item" data-category="study">
                <div class="article-title">📚 （待添加）学习方法类文章</div>
                <div class="article-meta">
                    <span>即将更新</span>
                    <span class="article-tag">学习方法</span>
                    <span>州官点灯学习</span>
                </div>
            </a>
            
            <a href="#" class="article-item" data-category="efficiency">
                <div class="article-title">⚡ （待添加）效率提升类文章</div>
                <div class="article-meta">
                    <span>即将更新</span>
                    <span class="article-tag">效率提升</span>
                    <span>州官点灯学习</span>
                </div>
            </a>
            
            <a href="#" class="article-item" data-category="resource">
                <div class="article-title">🎁 （待添加）资源分享类文章</div>
                <div class="article-meta">
                    <span>即将更新</span>
                    <span class="article-tag">资源分享</span>
                    <span>州官点灯学习</span>
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p>✨ 感谢阅读，欢迎扫码关注我的公众号 ✨</p>
        </div>
    </div>
    
    <script>
        // 分类筛选功能
        const categoryBtns = document.querySelectorAll('.category-btn');
        const articleItems = document.querySelectorAll('.article-item');
        
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 移除所有按钮的active状态
                categoryBtns.forEach(b => b.classList.remove('active'));
                // 给当前按钮添加active状态
                btn.classList.add('active');
                
                const category = btn.dataset.category;
                
                // 筛选文章
                articleItems.forEach(item => {
                    if (category === 'all' || item.dataset.category === category) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
