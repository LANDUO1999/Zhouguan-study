<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>州官点灯学习 - 公众号文章</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-cream: #FAF8F5;
            --bg-warm: #F5F0E8;
            --text-dark: #3D352A;
            --text-muted: #7A6F5F;
            --accent-terracotta: #C67B5C;
            --accent-sage: #8FA887;
            --accent-gold: #D4A574;
            --card-shadow: 0 4px 20px rgba(61, 53, 42, 0.08);
            --card-hover-shadow: 0 8px 30px rgba(61, 53, 42, 0.12);
        }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--bg-cream) 0%, var(--bg-warm) 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(198, 123, 92, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(143, 168, 135, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .main-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            padding: 30px 24px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(61, 53, 42, 0.08);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-content {
            text-align: center;
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 18px;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-terracotta) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .avatar-ring {
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
        }
        
        .welcome-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 26px;
            color: var(--text-dark);
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        
        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .sidebar-stats {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 16px;
            padding: 14px 0;
            border-top: 1px solid rgba(61, 53, 42, 0.08);
            border-bottom: 1px solid rgba(61, 53, 42, 0.08);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-terracotta);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 18px;
            box-shadow: var(--card-shadow);
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .music-cover {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-sage) 0%, var(--accent-gold) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .music-details {
            flex: 1;
            text-align: left;
        }

        .music-song {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 3px;
        }

        .music-artist {
            font-size: 12px;
            color: var(--text-muted);
        }

        .music-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 10px;
        }

        .music-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-dark);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-btn:hover {
            background: rgba(198, 123, 92, 0.1);
            color: var(--accent-terracotta);
        }

        .music-btn.play {
            width: 42px;
            height: 42px;
            background: var(--accent-terracotta);
            color: white;
            font-size: 16px;
        }

        .music-btn.play:hover {
            background: #B06A4D;
            transform: scale(1.1);
        }

        .music-progress {
            height: 3px;
            background: rgba(61, 53, 42, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .music-progress-bar {
            height: 100%;
            background: var(--accent-terracotta);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .sidebar-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 18px;
        }
        
        .sidebar-tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(198, 123, 92, 0.2);
            border-radius: 16px;
            font-size: 12px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .sidebar-tag:hover {
            background: var(--accent-terracotta);
            color: white;
            transform: translateY(-2px);
        }

        .xianyu-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #FF9B7B 0%, #FF6B6B 100%);
            color: white;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .xianyu-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .xianyu-link .xianyu-icon {
            font-size: 18px;
        }

        .xianyu-description {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 155, 123, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.8;
            color: #3D352A;
        }

        .xianyu-description p {
            margin: 0;
            padding: 0;
        }

        .xianyu-description p.section-space {
            margin-top: 12px;
        }
        
        .main-content {
            flex: 1;
            padding: 30px 35px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            flex: 1;
            align-content: center;
        }
        
        .content-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            padding: 20px 18px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-terracotta), var(--accent-gold), var(--accent-sage));
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        
        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-hover-shadow);
        }
        
        .content-card:hover::before {
            transform: scaleX(1);
        }
        
        .card-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        
        .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .card-count {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(198, 123, 92, 0.1), rgba(212, 165, 116, 0.1));
            border-radius: 10px;
            font-size: 12px;
            color: var(--accent-terracotta);
            font-weight: 500;
        }
        
        .single-category-view {
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(198, 123, 92, 0.3);
            border-radius: 18px;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: var(--accent-terracotta);
            color: white;
            transform: translateX(-4px);
        }
        
        .category-detail-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
        }
        
        .detail-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-terracotta) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        
        .detail-info {
            flex: 1;
        }
        
        .detail-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 26px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .detail-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        
        .detail-badge {
            display: inline-block;
            padding: 5px 14px;
            background: linear-gradient(135deg, var(--accent-terracotta) 0%, var(--accent-gold) 100%);
            color: white;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .subcategories-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 26px;
            box-shadow: var(--card-shadow);
        }

        .subcategory {
            margin-bottom: 16px;
        }

        .subcategory-title {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            padding: 10px 0;
            transition: all 0.3s ease;
        }

        .subcategory-title:hover {
            color: var(--accent-terracotta);
        }

        .toggle-icon {
            font-size: 12px;
            transition: transform 0.3s ease;
        }

        .toggle-icon.expanded {
            transform: rotate(90deg);
        }

        .article-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }

        .article-list.expanded {
            max-height: 2000px;
            opacity: 1;
        }
        
        .subcategory {
            margin-bottom: 26px;
        }
        
        .subcategory:last-child {
            margin-bottom: 0;
        }
        
        .subcategory-title {
            color: var(--text-dark);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            padding-left: 10px;
            border-left: 3px solid var(--accent-terracotta);
        }
        
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .article-item {
            padding: 16px 18px;
            background: rgba(250, 248, 245, 0.6);
            border: 1px solid transparent;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        
        .article-item:hover {
            background: white;
            border-color: var(--accent-terracotta);
            transform: translateX(6px);
            box-shadow: var(--card-hover-shadow);
        }
        
        .article-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .article-item:hover .article-title {
            color: var(--accent-terracotta);
        }
        
        .article-meta {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .article-date {
            color: var(--text-muted);
            font-size: 13px;
        }
        
        .article-tag {
            background: linear-gradient(135deg, var(--accent-terracotta) 0%, var(--accent-gold) 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .article-empty {
            background: rgba(250, 248, 245, 0.6);
            border-radius: 12px;
            padding: 26px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .empty-icon {
            font-size: 36px;
            opacity: 0.5;
        }
        
        .empty-text {
            color: var(--text-muted);
            font-size: 13px;
        }
        
        .footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(61, 53, 42, 0.1);
            text-align: center;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .qr-code-area {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 22px 28px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        .qr-code-placeholder {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(198, 123, 92, 0.1), rgba(212, 165, 116, 0.1));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 2px dashed var(--accent-terracotta);
        }

        .qr-code-text {
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
        }

        .mobile-qrcode {
            display: none;
        }
        
        @media (max-width: 1200px) {
            .content-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 1024px) {
            .main-layout {
                flex-direction: column;
                align-items: stretch;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(61, 53, 42, 0.08);
                padding: 30px 20px;
            }
            
            .main-content {
                padding: 25px 20px;
                min-height: auto;
            }

            .content-grid {
                grid-template-columns: repeat(2, 1fr);
                align-content: start;
            }
        }
        
        @media (max-width: 640px) {
            .main-layout {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                padding: 25px 16px;
            }
            
            .main-content {
                padding: 20px 16px;
                min-height: auto;
            }

            .content-grid {
                grid-template-columns: 1fr;
                gap: 14px;
                align-content: start;
            }
            
            .category-detail-header {
                flex-direction: column;
                text-align: center;
                padding: 22px 16px;
            }

            .sidebar-stats {
                gap: 24px;
            }

            .welcome-title {
                font-size: 24px;
            }

            .card-title {
                font-size: 15px;
            }

            .qrcode-container {
                display: none;
            }

            .mobile-qrcode {
                display: block !important;
                margin-top: 30px;
                text-align: center;
            }
        }
    
        .search-input:focus {
            outline: none;
            border-color: #C67B5C;
            box-shadow: 0 0 0 4px rgba(198, 123, 92, 0.1);
        }
        
        .search-results.show {
            display: block;
        }
        
        .search-result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f8f9fa;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        .search-result-item:hover {
            background: #f8f9fa;
        }
        
        .search-result-title {
            font-size: 14px;
            color: #3D352A;
            margin-bottom: 4px;
        }
        
        .search-result-category {
            font-size: 12px;
            color: #7A6F5F;
        }
        
        .search-no-results {
            padding: 24px;
            text-align: center;
            color: #7A6F5F;
            font-size: 14px;
        }

        .qrcode-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .qrcode-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
        }

        .qrcode-title {
            font-size: 14px;
            color: #3D352A;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .qrcode-placeholder {
            width: 150px;
            height: 150px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7A6F5F;
            font-size: 12px;
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(198, 123, 92, 0.3);
            border-radius: 50%;
            border-top-color: #C67B5C;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #7A6F5F;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="avatar-wrapper">
                    <div class="avatar-ring"></div>
                    <div class="avatar" style="background: white; padding: 0; overflow: hidden;">
                        <img src="images/avatar.jpg" alt="公众号头像" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    </div>
                </div>
                <h1 class="welcome-title">州官点灯学习</h1>
                <p class="welcome-subtitle">分享实用工具和学习方法</p>
                
                <div class="sidebar-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="totalArticles">0</div>
                        <div class="stat-label">篇文章</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="totalCategories">0</div>
                        <div class="stat-label">个分类</div>
                    </div>
                </div>

                <div class="search-container" style="margin: 20px 0; position: relative; z-index: 100;">
                  <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索文章标题..." oninput="searchArticles()" style="width: 100%; padding: 12px 16px; font-size: 14px; border: 2px solid #e9ecef; border-radius: 10px; background: white; font-family: inherit; transition: all 0.3s;">
                  <div class="search-results" id="searchResults" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e9ecef; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); margin-top: 10px; max-height: 300px; overflow-y: auto; display: none; z-index: 1000;"></div>
                </div>

                <div class="music-player">
                    <div class="music-info">
                        <div class="music-cover" id="musicCover">🎵</div>
                        <div class="music-details">
                            <div class="music-song" id="musicSong">等待添加音乐</div>
                            <div class="music-artist" id="musicArtist">请上传音乐文件</div>
                        </div>
                    </div>
                    <div class="music-controls">
                        <button class="music-btn" onclick="prevTrack()">⏮</button>
                        <button class="music-btn play" id="playBtn" onclick="togglePlay()">▶</button>
                        <button class="music-btn" onclick="nextTrack()">⏭</button>
                    </div>
                    <div class="music-progress" onclick="seekMusic(event)">
                        <div class="music-progress-bar" id="progressBar"></div>
                    </div>
                </div>
                
                <a href="https://m.tb.cn/h.iODyLHm?tk=jODy5VJoMHm" target="_blank" class="xianyu-link">
                    <span class="xianyu-icon">🐟</span>
                    <span>咸鱼店铺</span>
                </a>
                
                <div class="xianyu-description">
                    <p><strong>嘿，朋友！遇到问题了？</strong></p>
                    <p>别急，我咸鱼开店了</p>
                    <p>专门解决各种软件麻烦，真人服务</p>
                    <p><strong>第一次来给你个特价：</strong></p>
                    <p>15块的服务，你只要1块5</p>
                    <p class="section-space"><strong>能帮你啥：</strong></p>
                    <p>• CAD/SU安装包（最新版）</p>
                    <p>• 软件崩溃修复</p>
                    <p>• 公众号没覆盖的问题</p>
                    <p>• 远程手把手教</p>
                    <p class="section-space"><strong>操作：</strong>关注公众号→咸鱼下单→发截图</p>
                </div>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div id="loadingIndicator" style="display: flex; align-items: center; justify-content: center; height: 200px;">
                <div class="loading-spinner"></div>
                <span class="loading-text">加载中...</span>
            </div>
            <div id="all-categories-view" style="display: none;">
                <div class="content-grid" id="categoriesGrid"></div>
            </div>
            <div id="single-categories-container"></div>
        </main>
        
        <div class="qrcode-container">
            <div class="qrcode-box">
                <div class="qrcode-title">扫码关注公众号</div>
                <img src="images/qrcode.jpg" alt="公众号二维码" style="width: 150px; height: 150px; border-radius: 8px;">
            </div>
        </div>
    </div>
    
    <script>
        let articlesData = [];
        let currentCategory = null;
        
        const categoryIcons = {
            "CAD / 天正": "📐",
            "Adobe 软件": "🎨",
            "AI 工具": "🤖",
            "SU 软件": "🏗️",
            "办公软件技巧": "📊",
            "效率工具": "⚡",
            "电脑系统和软件": "💻",
            "公众号运营": "📱",
            "个人 / 娱乐类": "🎮",
            "默认": "📁"
        };

        const categoryDescriptions = {
            "CAD / 天正": "CAD设计与天正软件",
            "Adobe 软件": "PS、ID等教程",
            "AI 工具": "人工智能工具",
            "SU 软件": "3D建模工具",
            "办公软件技巧": "演示文稿制作",
            "效率工具": "提升工作效率",
            "电脑系统和软件": "系统问题和软件",
            "公众号运营": "公众号使用技巧",
            "个人 / 娱乐类": "休闲娱乐内容",
            "默认": "其他内容"
        };

        async function loadArticles() {
            try {
                const response = await fetch('articles-database.json');
                articlesData = await response.json();
                
                if (Array.isArray(articlesData)) {
                    renderCategories();
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('all-categories-view').style.display = 'block';
                }
            } catch (error) {
                console.error('加载文章数据失败:', error);
                document.getElementById('loadingIndicator').innerHTML = '<span style="color: #C67B5C;">加载失败，请检查 articles-database.json 文件</span>';
            }
        }

        function renderCategories() {
            const categoryStats = {};
            articlesData.forEach(article => {
                const category = article.category || '默认';
                categoryStats[category] = (categoryStats[category] || 0) + 1;
            });

            const categories = Object.keys(categoryStats);
            
            document.getElementById('totalArticles').textContent = articlesData.length;
            document.getElementById('totalCategories').textContent = categories.length;

            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = categories.map(category => {
                const icon = categoryIcons[category] || categoryIcons['默认'];
                const desc = categoryDescriptions[category] || categoryDescriptions['默认'];
                return `
                    <div class="content-card" data-category="${encodeURIComponent(category)}" onclick="showCategory('${encodeURIComponent(category)}')">
                        <div class="card-icon">${icon}</div>
                        <div class="card-title">${escapeHtml(category)}</div>
                        <div class="card-desc">${desc}</div>
                        <div class="card-count">${categoryStats[category]}篇</div>
                    </div>
                `;
            }).join('');
        }

        function showCategory(category) {
            category = decodeURIComponent(category);
            currentCategory = category;
            
            document.getElementById('all-categories-view').style.display = 'none';
            
            const articles = articlesData.filter(a => a.category === category);
            
            const subcategories = {};
            articles.forEach(article => {
                const subcat = article.subcategory || '未分类';
                if (!subcategories[subcat]) {
                    subcategories[subcat] = [];
                }
                subcategories[subcat].push(article);
            });

            const icon = categoryIcons[category] || categoryIcons['默认'];
            const desc = categoryDescriptions[category] || categoryDescriptions['默认'];

            const container = document.getElementById('single-categories-container');
            container.innerHTML = `
                <div class="single-category-view">
                    <button class="back-btn" onclick="showAllCategories()">← 返回全部分类</button>
                    <div class="category-detail-header">
                        <div class="detail-icon">${icon}</div>
                        <div class="detail-info">
                            <h2 class="detail-title">${escapeHtml(category)}</h2>
                            <p class="detail-desc">${desc}</p>
                            <span class="detail-badge">${articles.length}篇文章</span>
                        </div>
                    </div>
                    <div class="subcategories-container">
                        ${Object.keys(subcategories).map(subcat => `
                            <div class="subcategory">
                                <h4 class="subcategory-title" onclick="toggleSubcategory(this)"><span class="toggle-icon">▶</span>📁 ${escapeHtml(subcat)}</h4>
                                <div class="article-list">
                                    ${subcategories[subcat].map(article => `
                                        <a href="${escapeHtml(article.url)}" target="_blank" class="article-item">
                                            <div class="article-title">${escapeHtml(article.title)}</div>
                                            <div class="article-meta">
                                                <span class="article-date">${article.date || '未知日期'}</span>
                                                <span class="article-tag">${escapeHtml(category)}</span>
                                            </div>
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function showAllCategories() {
            currentCategory = null;
            document.getElementById('single-categories-container').innerHTML = '';
            document.getElementById('all-categories-view').style.display = 'block';
        }

        function toggleSubcategory(element) {
            const icon = element.querySelector('.toggle-icon');
            const list = element.nextElementSibling;
            
            if (list.classList.contains('expanded')) {
                list.classList.remove('expanded');
                icon.classList.remove('expanded');
            } else {
                list.classList.add('expanded');
                icon.classList.add('expanded');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function searchArticles() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsContainer = document.getElementById('searchResults');
            
            if (searchTerm === '') {
                resultsContainer.style.display = 'none';
                return;
            }

            const results = articlesData.filter(article => 
                article.title.toLowerCase().includes(searchTerm) ||
                article.category.toLowerCase().includes(searchTerm)
            );

            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="search-no-results">😕 未找到相关文章</div>';
            } else {
                resultsContainer.innerHTML = results.map(article => `
                    <a href="${escapeHtml(article.url)}" target="_blank" style="display: block; padding: 12px 16px; text-decoration: none; color: #3D352A; border-bottom: 1px solid #f0f0f0; transition: background 0.2s;" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='transparent'">
                        <div style="font-weight: 500; margin-bottom: 4px;">${escapeHtml(article.title)}</div>
                        <div style="font-size: 12px; color: #7A6F5F;">${escapeHtml(article.category)}</div>
                    </a>
                `).join('');
            }
            resultsContainer.style.display = 'block';
        }

        document.addEventListener('click', function(event) {
            const searchInput = document.getElementById('searchInput');
            const resultsContainer = document.getElementById('searchResults');
            
            if (searchInput && resultsContainer) {
                if (!searchInput.contains(event.target) && !resultsContainer.contains(event.target)) {
                    resultsContainer.style.display = 'none';
                }
            }
        });

        document.addEventListener('DOMContentLoaded', loadArticles);

        let isPlaying = false;
        let progressInterval = null;
        const progressBar = document.getElementById('progressBar');
        
        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                btn.innerHTML = '▶';
                isPlaying = false;
                clearInterval(progressInterval);
            } else {
                btn.innerHTML = '⏸';
                isPlaying = true;
                progressInterval = setInterval(() => {
                    const currentWidth = parseFloat(progressBar.style.width) || 0;
                    if (currentWidth >= 100) {
                        progressBar.style.width = '0%';
                    } else {
                        progressBar.style.width = (currentWidth + 0.5) + '%';
                    }
                }, 100);
            }
        }
        
        function seekMusic(event) {
            const progress = document.querySelector('.music-progress');
            const rect = progress.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            progressBar.style.width = Math.max(0, Math.min(100, percent * 100)) + '%';
        }
        
        function prevTrack() {
            progressBar.style.width = '0%';
        }
        
        function nextTrack() {
            progressBar.style.width = '0%';
        }
    </script>
</body>
</html>
