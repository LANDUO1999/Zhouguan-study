<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>州官点灯 - 文章分类管理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { color: #fff; font-size: 28px; margin-bottom: 10px; }
        .header p { color: rgba(255,255,255,0.7); font-size: 14px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 15px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            font-size: 16px; cursor: pointer; color: #fff; font-weight: 600;
            transition: all 0.3s;
        }
        .tab:hover { background: rgba(255,255,255,0.2); }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: transparent; }
        
        .card {
            background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); display: none;
        }
        .card.active { display: block; }
        .card h2 { color: #fff; margin-bottom: 20px; font-size: 22px; }
        
        .upload-section {
            background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 10px; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer;
        }
        .upload-section:hover { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .upload-section p { color: rgba(255,255,255,0.7); }
        
        .btn {
            padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn:hover { transform: translateY(-2px); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; border-radius: 10px; text-align: center;
        }
        .stat-number { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        
        .category-list { display: grid; gap: 15px; }
        .category-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 20px;
        }
        .category-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .category-name {
            color: #fff; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px;
        }
        .category-count {
            background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 15px; font-size: 14px;
        }
        
        .article-list {
            max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; margin-top: 10px;
        }
        .article-item {
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .article-item:last-child { border-bottom: none; }
        .article-title { color: rgba(255,255,255,0.9); font-size: 14px; flex: 1; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 8px;
            font-size: 14px; color: #fff;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        
        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
            font-size: 16px; color: #fff;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }
        
        .alert {
            padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none;
        }
        .alert.success { background: rgba(17,153,142,0.2); color: #38ef7d; border: 1px solid rgba(17,153,142,0.3); }
        .alert.show { display: block; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏷️ 州官点灯 - 文章分类管理工具</h1>
            <p>查看所有文章 · 修改分类名称 · 调整文章分类</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('load')">📂 加载数据</button>
            <button class="tab" onclick="showTab('view')">👁️ 查看分类</button>
            <button class="tab" onclick="showTab('edit')">✏️ 批量编辑</button>
            <button class="tab" onclick="showTab('save')">💾 保存导出</button>
        </div>

        <!-- 加载数据 -->
        <div id="load" class="card active">
            <h2>📂 加载文章数据库</h2>
            <div id="loadAlert" class="alert"></div>
            
            <div class="upload-section" onclick="document.getElementById('dbFile').click()">
                <p>📁 点击这里选择 articles-database.json 文件</p>
                <input type="file" id="dbFile" accept=".json" style="display: none;" onchange="loadDatabase()">
            </div>

            <div id="loadStats" class="stats-grid" style="display: none;"></div>
        </div>

        <!-- 查看分类 -->
        <div id="view" class="card">
            <h2>👁️ 查看所有分类和文章</h2>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章标题..." oninput="filterArticles()">
            </div>

            <div id="categoryView" class="category-list">
                <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">
                    请先在"加载数据"标签页加载数据库文件
                </div>
            </div>
        </div>

        <!-- 批量编辑 -->
        <div id="edit" class="card">
            <h2>✏️ 批量编辑分类</h2>
            
            <div id="editAlert" class="alert"></div>
            
            <h3 style="color: #fff; margin-bottom: 15px;">重命名分类</h3>
            <div class="form-group">
                <label for="oldCategory">选择要重命名的分类：</label>
                <select id="oldCategory">
                    <option value="">请选择</option>
                </select>
            </div>
            <div class="form-group">
                <label for="newCategory">新分类名称：</label>
                <input type="text" id="newCategory" placeholder="请输入新的分类名称">
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="renameCategory">🔄 重命名分类</button>
            </div>

            <div style="margin-top: 40px;">
                <h3 style="color: #fff; margin-bottom: 15px;">移动文章分类</h3>
                <div class="form-group">
                    <label for="moveFrom">从分类：</label>
                    <select id="moveFrom" onchange="loadArticleSelect()">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="moveTo">移动到：</label>
                    <select id="moveTo">
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>选择要移动的文章（按住Ctrl多选）：</label>
                    <select id="articleSelect" multiple style="height: 200px;">
                        <option value="">请先选择源分类</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="moveArticles">📦 移动选中的文章</button>
                </div>
            </div>
        </div>

        <!-- 保存导出 -->
        <div id="save" class="card">
            <h2>💾 保存并导出</h2>
            
            <div id="saveStats" class="stats-grid"></div>
            
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="color: #fff; margin-bottom: 15px;">操作步骤：</h3>
                <div style="color: rgba(255,255,255,0.8); line-height: 2;">
                    1. 确认修改无误<br>
                    2. 点击下方"下载数据库"按钮<br>
                    3. 用下载的文件替换项目中的 articles-database.json<br>
                    4. 手动更新 index.html 中的分类显示
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-success" onclick="downloadDatabase()">💾 下载数据库</button>
            </div>
        </div>
    </div>

    <script>
        let articlesDb = null;
        let originalDb = null;

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');

            if (tabId === 'view' && articlesDb) renderCategoryView();
            if (tabId === 'edit' && articlesDb) populateEditSelects();
            if (tabId === 'save' && articlesDb) updateSaveStats();
        }

        function showAlert(elementId, message) {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.className = 'alert success show';
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        function loadDatabase() {
            const file = document.getElementById('dbFile').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    articlesDb = JSON.parse(e.target.result);
                    originalDb = JSON.parse(JSON.stringify(articlesDb));
                    showAlert('loadAlert', '✅ 数据库加载成功！');
                    renderLoadStats();
                } catch (err) {
                    alert('数据库解析失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function renderLoadStats() {
            const statsDiv = document.getElementById('loadStats');
            statsDiv.style.display = 'grid';
            
            let html = `<div class="stat-card"><div class="stat-number">${articlesDb.totalArticles}</div><div class="stat-label">总文章数</div></div>`;
            
            const stats = articlesDb.categoryStats || {};
            for (const [cat, count] of Object.entries(stats)) {
                html += `<div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);"><div class="stat-number">${count}</div><div class="stat-label">${escapeHtml(cat)}</div></div>`;
            }
            
            statsDiv.innerHTML = html;
        }

        function renderCategoryView() {
            const container = document.getElementById('categoryView');
            const stats = articlesDb.categoryStats || {};
            let html = '';

            for (const [category, count] of Object.entries(stats)) {
                const articles = articlesDb.articles.filter(a => a.category === category);
                html += `
                <div class="category-item">
                    <div class="category-header">
                        <div class="category-name">
                            <span>🏷️</span>
                            <span>${escapeHtml(category)}</span>
                            <span class="category-count">${count} 篇</span>
                        </div>
                    </div>
                    <div class="article-list">
                        ${articles.map(article => `
                            <div class="article-item">
                                <span class="article-title">${escapeHtml(article.title)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function filterArticles() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('categoryView');
            const stats = articlesDb.categoryStats || {};
            let html = '';

            for (const [category, count] of Object.entries(stats)) {
                let articles = articlesDb.articles.filter(a => a.category === category);
                
                if (query) {
                    articles = articles.filter(a => a.title.toLowerCase().includes(query));
                    if (articles.length === 0) continue;
                }

                html += `
                <div class="category-item">
                    <div class="category-header">
                        <div class="category-name">
                            <span>🏷️</span>
                            <span>${escapeHtml(category)}</span>
                            <span class="category-count">${articles.length} 篇</span>
                        </div>
                    </div>
                    <div class="article-list">
                        ${articles.map(article => `
                            <div class="article-item">
                                <span class="article-title">${escapeHtml(article.title)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            }

            container.innerHTML = html || '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">没有找到匹配的文章</div>';
        }

        function populateEditSelects() {
            const categories = Object.keys(articlesDb.categoryStats || {});
            const options = categories.map(c => `<option value="${escapeHtmlAttr(c)}">${escapeHtml(c)}</option>`).join('');
            
            document.getElementById('oldCategory').innerHTML = '<option value="">请选择</option>' + options;
            document.getElementById('moveFrom').innerHTML = '<option value="">请选择</option>' + options;
            document.getElementById('moveTo').innerHTML = '<option value="">请选择</option>' + options;
        }

        function loadArticleSelect() {
            const fromCategory = document.getElementById('moveFrom').value;
            if (!fromCategory) return;

            const articles = articlesDb.articles.filter(a => a.category === fromCategory);
            const select = document.getElementById('articleSelect');
            select.innerHTML = articles.map(a => `<option value="${escapeHtmlAttr(a.title)}">${escapeHtml(a.title)}</option>`).join('');
        }

        function renameCategory() {
            const oldName = document.getElementById('oldCategory').value;
            const newName = document.getElementById('newCategory').value.trim();
            
            if (!oldName || !newName || oldName === newName) return;

            articlesDb.articles.forEach(article => {
                if (article.category === oldName) article.category = newName;
            });

            const count = articlesDb.categoryStats[oldName];
            delete articlesDb.categoryStats[oldName];
            articlesDb.categoryStats[newName] = count;

            showAlert('editAlert', `✅ 已将 "${oldName}" 重命名为 "${newName}"`);
            populateEditSelects();
            document.getElementById('newCategory').value = '';
        }

        function moveArticles() {
            const fromCategory = document.getElementById('moveFrom').value;
            const toCategory = document.getElementById('moveTo').value;
            const selectedOptions = Array.from(document.getElementById('articleSelect').selectedOptions);
            
            if (!fromCategory || !toCategory || fromCategory === toCategory || selectedOptions.length === 0) return;

            const titles = selectedOptions.map(o => o.value);
            let movedCount = 0;

            articlesDb.articles.forEach(article => {
                if (article.category === fromCategory && titles.includes(article.title)) {
                    article.category = toCategory;
                    movedCount++;
                }
            });

            articlesDb.categoryStats[fromCategory] -= movedCount;
            articlesDb.categoryStats[toCategory] = (articlesDb.categoryStats[toCategory] || 0) + movedCount;

            if (articlesDb.categoryStats[fromCategory] <= 0) {
                delete articlesDb.categoryStats[fromCategory];
            }

            showAlert('editAlert', `✅ 成功移动 ${movedCount} 篇文章`);
            populateEditSelects();
            loadArticleSelect();
        }

        function updateSaveStats() {
            const statsDiv = document.getElementById('saveStats');
            
            let html = `<div class="stat-card"><div class="stat-number">${articlesDb.totalArticles}</div><div class="stat-label">总文章数</div></div>`;
            
            const stats = articlesDb.categoryStats || {};
            for (const [cat, count] of Object.entries(stats)) {
                html += `<div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);"><div class="stat-number">${count}</div><div class="stat-label">${escapeHtml(cat)}</div></div>`;
            }
            
            statsDiv.innerHTML = html;
        }

        function downloadDatabase() {
            if (!articlesDb) return;
            const blob = new Blob([JSON.stringify(articlesDb, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'articles-database.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeHtmlAttr(text) {
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
